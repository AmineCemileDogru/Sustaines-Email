<!DOCTYPE html>
<html lang='tr'>

<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Şifre Sıfırlama</title>
</head>

<body style='margin:0; padding:0; font-family: "Segoe UI", sans-serif; background-color:#f9fafb;'>
  <table role='presentation' cellspacing='0' cellpadding='0' border='0' width='100%'>
    <tr>
      <td align='center' style='padding:60px 0;'>
        <table role='presentation' cellspacing='0' cellpadding='0' border='0' width='500'
          style='background:#ffffff; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.05); overflow:hidden;'>

          <tr>
            <td align='center' style='padding:40px 40px 10px 40px; background-color: #ffffff;'>
              <a href='https://sustaines.com' target='_blank' style='text-decoration:none;'>
                <img src='https://raw.githubusercontent.com/AmineCemileDogru/Sustaines-Email/main/Sustaines_Logosu.png'
                  alt='SustainES' width='280' border='0'
                  style='display:block; border:0; width: 280px; height: auto; outline: none; color: #ffffff;'>
              </a>
            </td>
          </tr>

          <tr>
            <td style='padding:20px 40px; text-align:center;'>
              <h1 style='color:#046DAE; font-size:24px; margin:0 0 15px 0; font-weight:700;'>Şifre Sıfırlama</h1>
              <p style='color:#4b5563; font-size:16px; line-height:1.6; margin:0;'>
                Merhaba <strong>{{UserName}}</strong>, şifreni sıfırlamak için bir talep aldık.<br />
                Yeni şifreni belirlemek için aşağıdaki butona tıkla.
              </p>
            </td>
          </tr>

          <tr>
            <td align='center' style='padding:30px 40px;'>
              <a href='{resetLink}' target='_blank'
                style='background:#046DAE; color:#ffffff; text-decoration:none; padding:14px 32px; border-radius:8px; font-weight:bold; display:inline-block; font-size:16px;'>
                Şifremi Sıfırla
              </a>
            </td>
          </tr>

          <tr>
            <td style='padding:25px 40px; background-color:#fcfcfc; border-top:1px solid #f1f5f9; text-align:center;'>
              <p style='color:#6b7280; font-size:12px; margin:0; line-height:1.5;'>
                <strong>SustainES</strong> · Sürdürülebilir Çözümler Platformu<br />
                © 2025 SustainES. Tüm hakları saklıdır.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>

</html>
